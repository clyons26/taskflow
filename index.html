<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaskFlow</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>TaskFlow</h1>

        <p class="subtitle">
            Organize your day with elegance.
        </p>


        <div class="input-area">

            <input 
                type="text" 
                id="taskInput" 
                placeholder="Enter a task..."
            >

            <button id="addTask">
                Add
            </button>

        </div>


        <div class="stats">

    <div class="stat-card">
        <h3>Total</h3>
        <p id="totalTasks">0</p>
    </div>


    <div class="stat-card">
        <h3>Completed</h3>
        <p id="completedTasks">0</p>
    </div>


    <div class="stat-card">
        <h3>Remaining</h3>
        <p id="remainingTasks">0</p>
    </div>

</div>


<div class="progress-container">

    <div id="progressBar"></div>

</div>


<ul id="taskList"></ul>


    </div>


    <script src="script.js"></script>

</body>

</html>
